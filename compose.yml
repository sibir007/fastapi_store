  #         target: /app/main_test.py
  #       - action: rebuild
  #         path: requirements.txt
  worker:
    container_name: worker
    build: .
    # network_mode: host
    # ports:
    #   - 8004:8000
    command: faststream run project.auth_worker:app
    # command: uvicorn fastapi_app.main:app --host 0.0.0.0 --reload
    # volumes:
    #   - ./project:/usr/src/app
    env_file: ".env"
    # # environment:
    # #   - CELERY_BROKER_URL=redis://redis:6379/0
    # #   - CELERY_RESULT_BACKEND=redis://redis:6379/0
    network_mode: host
    develop:
      watch:
        - action: sync+restart
          path: project
          target: /app/project
        - action: rebuild
          path: requirements.txt
    # depends_on:
    #   - redis
    depends_on:
      queue:
        condition: service_healthy
