
services:
  queue:
    image: redis:8.6.2
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
  db:
    image: postgres:18.3
    container_name: postgres
    restart: always
    # env_file:
    #   - .env
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app
      # POSTGRES_USER: ${POSTGRES_USER}  
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  
      # POSTGRES_DB: ${POSTGRES_DB} 
      PGDATA: /var/lib/postgresql/data/pgdata    
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
  adminer:
    image: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"

