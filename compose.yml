
services:
  queue:
    image: redis:latest
    container_name: redis
    ports:
      - "6380:6379"
  db:
    image: postgres
    container_name: postgres
    restart: always
    # env_file:
    #   - .env
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app
      # POSTGRES_USER: ${POSTGRES_USER}  
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  
      # POSTGRES_DB: ${POSTGRES_DB} 
      PGDATA: /var/lib/postgresql/data/pgdata    
    ports:
      - "5430:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
  adminer:
    image: adminer
    restart: always
    ports:
      - 8090:8080

volumes:
  pgdata:
    driver: local
