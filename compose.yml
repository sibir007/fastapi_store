
services:
  queue:
    image: redis:latest
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    # healthcheck:
    #   test: ["CMD", "redis-cli", "ping"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 5
    #   start_period: 10s
  db:
    image: postgres
    container_name: postgres
    restart: always
    # env_file:
    #   - .env
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: app
      # POSTGRES_USER: ${POSTGRES_USER}  
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  
      # POSTGRES_DB: ${POSTGRES_DB} 
      PGDATA: /var/lib/postgresql/data/pgdata    
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
  adminer:
    image: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"

  store:
    container_name: store
    build: .
    # network_mode: host
    # ports:
    #   - 8004:8000
    command: python3 main_test.py
    # command: uvicorn fastapi_app.main:app --host 0.0.0.0 --reload
    # volumes:
    #   - ./project:/usr/src/app
    # env_file: ".env"
    # # environment:
    # #   - CELERY_BROKER_URL=redis://redis:6379/0
    # #   - CELERY_RESULT_BACKEND=redis://redis:6379/0
    network_mode: host
    develop:
      watch:
        - action: sync+restart
          path: project
          target: /app/project
        - action: sync+restart
          path: main_test.py
          target: /app/main_test.py
        - action: rebuild
          path: requirements.txt
